<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colin Balcarek — NYC</title>
  <meta name="description" content="Colin Balcarek — Technical Product Manager based in New York City. NYC Marathon × 11, ceramics, software.">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://colinbalcarek.com/">
  <meta property="og:title"       content="Colin Balcarek — NYC">
  <meta property="og:description" content="Technical Product Manager · NYC Marathon × 11 · Ceramics · Software">
  <meta property="og:image"       content="https://colinbalcarek.com/assets/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Colin Balcarek — NYC">
  <meta name="twitter:description" content="Technical Product Manager · NYC Marathon × 11 · Ceramics · Software">
  <meta name="twitter:image"       content="https://colinbalcarek.com/assets/og-image.png">

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- Skip to content -->
<a class="skip-link" href="#map-container">Skip to map</a>

<!-- ── SOLARI BOARD INTRO ── -->
<div id="solari" role="status" aria-label="Loading: Colin Balcarek, Technical Product Manager, New York City 2026">
  <div id="sb-r1" class="sb-row" aria-hidden="true"></div>
  <div style="height:6px" aria-hidden="true"></div>
  <div id="sb-r2" class="sb-row" aria-hidden="true"></div>
  <div style="height:4px" aria-hidden="true"></div>
  <div id="sb-r3" class="sb-row" aria-hidden="true"></div>
  <div class="sb-label" aria-hidden="true">BALCAREK.COM · NEW YORK CITY · 2026</div>
  <button id="solari-skip">SKIP →</button>
</div>

<!-- ── MAP ── -->
<div id="map-container" role="img" aria-label="Interactive map of New York City"></div>

<!-- ── IDENTITY HEADER (top-left) ── -->
<div id="identity-header">
  <div id="ih-main">
    <img src="assets/headshot.jpg" alt="Colin Balcarek" id="ih-avatar">
    <div id="ih-text">
      <div id="ih-name">Colin Balcarek</div>
      <div id="ih-role">Technical Product Manager · NYC</div>
      <div id="ih-current"><span class="ih-dot"></span>Currently at: Medidata Solutions</div>
    </div>
    <div id="ih-actions">
      <a href="https://www.linkedin.com/in/colin-balcarek/" target="_blank" rel="noopener" aria-label="LinkedIn" class="id-link">in</a>
      <a href="mailto:colin@balcarek.org" aria-label="Email" class="id-link">✉</a>
      <button id="search-toggle" class="id-link" aria-label="Search" aria-expanded="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
  </div>
  <div id="search-expand" hidden>
    <input id="search-input" type="search" placeholder="Search work, running, art…"
           autocomplete="off" spellcheck="false" aria-label="Search"/>
  </div>
  <div id="search-results" role="listbox" aria-label="Search results"></div>
</div>

<!-- ── MODE SWITCHER ── -->
<nav id="mode-switcher" aria-label="Map modes">
  <button class="mode-pill active" data-mode="all"     aria-pressed="true" >🗺 Explore</button>
  <button class="mode-pill"        data-mode="work"    aria-pressed="false">💼 Work</button>
  <button class="mode-pill"        data-mode="running" aria-pressed="false" id="pill-running">🏃 Running</button>
  <button class="mode-pill"        data-mode="art"     aria-pressed="false">🏺 Art</button>
  <button class="mode-pill"        data-mode="tech"    aria-pressed="false">💻 Software</button>
</nav>

<!-- ── TAP HINT ── -->
<div id="tap-hint" aria-hidden="true">Tap any stop to explore →</div>

<!-- ── MARATHON YEAR SELECTOR ── -->
<div id="marathon-year-selector" aria-label="Select marathon year">
  <span style="font-size:11px;color:#6b7280;margin-right:4px" aria-hidden="true">Year:</span>
</div>

<!-- ── MAP CONTROLS ── -->
<div id="map-controls" role="group" aria-label="Map zoom">
  <button class="mc-btn" id="zoom-in"  aria-label="Zoom in">+</button>
  <button class="mc-btn" id="zoom-out" aria-label="Zoom out">−</button>
</div>
<!-- ── SCALE BAR ── -->
<div id="scale-bar" aria-hidden="true">
  <div class="scale-line" style="width:58px"></div>
  <span>5 miles</span>
</div>

<!-- ── BOTTOM SHEET ── -->
<div id="bottom-sheet" role="complementary" aria-label="Details">
  <div class="bs-handle-row" id="bs-handle-row" role="button" tabindex="0" aria-label="Close panel">
    <div class="bs-handle" aria-hidden="true"></div>
    <button class="bs-close" id="bs-close" aria-label="Close">✕</button>
  </div>
  <div id="bs-body"></div>
</div>

<!-- ── LIGHTBOX ── -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button id="lb-close" aria-label="Close">✕</button>
  <button id="lb-prev"  aria-label="Previous photo">‹</button>
  <button id="lb-next"  aria-label="Next photo">›</button>
  <div id="lb-img-wrap"><img id="lb-img" alt=""></div>
  <div id="lb-footer">
    <span id="lb-cap"></span>
    <span id="lb-counter"></span>
  </div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<script src="js/data.js"></script>
<script src="js/solari.js"></script>
<script src="js/layers.js"></script>
<script src="js/sheets.js"></script>
<script src="js/map.js"></script>
<script src="js/tour.js"></script>
</body>
</html>
